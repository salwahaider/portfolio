spring.application.name=tripsync-backend
server.port=${PORT:8080}

# ── Database ─────────────────────────────────────────────────────────────────
# If DATABASE_URL is set (Supabase/Render postgres), use PostgreSQL.
# Otherwise fall back to local H2 file database.
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./tripsync-db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# H2 console (local dev only — disable in prod)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Auto-detect dialect from driver
spring.jpa.database-platform=${JPA_DIALECT:}

# ── Security ──────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:super-secret-change-me-super-secret-change-me}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175}

